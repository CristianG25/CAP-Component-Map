<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAP Design System Component Mapping</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      overflow: hidden;
      color: #1a1a2e;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ─── VIEW BAR ───────────────────────────────────────── */
    #view-bar {
      height: 44px;
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
      position: relative;
      z-index: 20;
      flex-shrink: 0;
    }
    #view-bar-title {
      position: absolute; left: 18px;
      font-size: 18px; font-weight: 700; color: #111; letter-spacing: -.02em;
    }
    #view-toggle {
      display: flex;
      background: #f0f0f0;
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
    }
    .vt-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 16px; border-radius: 6px;
      border: none; background: transparent;
      font-size: 12px; font-weight: 600; color: #777;
      cursor: pointer; transition: all .15s;
    }
    .vt-btn.active {
      background: #fff; color: #111;
      box-shadow: 0 1px 4px rgba(0,0,0,.12);
    }
    .vt-btn:hover:not(.active) { color: #333; background: rgba(255,255,255,.5); }
    .vt-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

    #app { display: flex; flex: 1; overflow: hidden; }

    /* ─── SIDEBAR ────────────────────────────────────────── */
    #sidebar {
      width: 272px;
      min-width: 272px;
      background: #fff;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #e8e8e8;
      box-shadow: 2px 0 12px rgba(0,0,0,.06);
      z-index: 10;
    }

    .sb-header {
      padding: 18px 18px 14px;
      border-bottom: 1px solid #f0f0f0;
    }
    .sb-header h1 {
      font-size: 13px; font-weight: 700; color: #111; letter-spacing: -.01em;
    }
    .sb-header p {
      font-size: 11px; color: #888; margin-top: 3px;
    }

    .sb-search {
      padding: 10px 14px;
      border-bottom: 1px solid #f0f0f0;
      position: relative;
    }

    #search-dropdown {
      position: absolute;
      top: calc(100% - 1px);
      left: 0; right: 0;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-top: none;
      border-radius: 0 0 8px 8px;
      box-shadow: 0 6px 18px rgba(0,0,0,.11);
      z-index: 200;
      max-height: 280px;
      overflow-y: auto;
      display: none;
    }
    #search-dropdown::-webkit-scrollbar { width: 4px; }
    #search-dropdown::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
    .sd-item {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 14px; cursor: pointer;
      border-bottom: 1px solid #f5f5f5;
      transition: background .1s;
    }
    .sd-item:last-child { border-bottom: none; }
    .sd-item:hover, .sd-item.sd-active { background: #f0f6ff; }
    .sd-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .sd-name { font-size: 12px; font-weight: 600; color: #111; flex: 1; }
    .sd-cat  { font-size: 10px; font-weight: 500; color: #aaa; white-space: nowrap; }
    .sd-empty { padding: 12px 14px; font-size: 12px; color: #bbb; }
    .sb-search input {
      width: 100%; padding: 7px 10px;
      border: 1px solid #e0e0e0; border-radius: 6px;
      font-size: 12px; outline: none; color: #222;
      transition: border-color .2s;
      background: #fafafa;
    }
    .sb-search input:focus { border-color: #0078d4; background: #fff; }

    #legend {
      padding: 10px 14px;
      border-bottom: 1px solid #f0f0f0;
    }
    .legend-heading {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: #aaa; margin-bottom: 7px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 8px; border-radius: 7px; cursor: pointer;
      transition: filter .12s; border: 1.5px solid transparent;
      margin-bottom: 3px;
    }
    .legend-item:hover { filter: brightness(.96); }
    .legend-item.active { border-color: rgba(0,0,0,.15); }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .legend-label { font-size: 13px; font-weight: 600; flex: 1; }
    .legend-count {
      font-size: 11px;
      background: rgba(255,255,255,.6); border-radius: 10px;
      padding: 1px 7px; font-weight: 700;
    }

    #info-panel {
      flex: 1; overflow-y: auto; padding: 14px;
    }
    .info-empty {
      margin-top: 36px; text-align: center;
      color: #bbb; font-size: 12px; line-height: 1.6;
    }
    .info-empty svg { opacity: .3; margin-bottom: 10px; }

    .info-name {
      font-size: 15px; font-weight: 700; color: #111; margin-bottom: 4px;
    }
    .info-badge {
      display: inline-flex; align-items: center;
      padding: 2px 10px; border-radius: 12px;
      font-size: 10px; font-weight: 600; color: #fff;
      margin-bottom: 14px;
    }
    .info-section {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: #aaa;
      margin: 12px 0 5px;
    }
    .info-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px 4px 7px;
      border-radius: 6px; margin: 2px; cursor: pointer;
      font-size: 11px; font-weight: 500;
      transition: filter .15s, transform .1s;
      border: 1px solid transparent;
    }
    .info-chip:hover { filter: brightness(.94); transform: translateY(-1px); }
    .info-chip-dot { width: 7px; height: 7px; border-radius: 50%; }

    /* ─── GRAPH ──────────────────────────────────────────── */
    #graph-wrap { flex: 1; position: relative; }
    #graph-wrap svg { width: 100%; height: 100%; }

    .hull-path {
      fill-opacity: .38; stroke-width: 1.5;
      stroke-dasharray: 6,5; stroke-opacity: .45;
    }
    .cat-label-text {
      font-size: 7.5px; font-weight: 900;
      text-transform: uppercase; letter-spacing: .1em;
      pointer-events: none;
    }
    .cat-label-sub {
      pointer-events: none;
    }
    .cat-label-bg {
      fill: #fff; rx: 4px;
      pointer-events: none;
    }

    .link { stroke-opacity: .55; }

    .node-g { cursor: pointer; }
    .node-g circle { transition: r .15s; }
    .node-g:hover circle { r: 6px; }
    .node-label {
      font-size: 8px; font-weight: 600;
      pointer-events: none; user-select: none;
    }

    /* ─── CONTROLS ───────────────────────────────────────── */
    #controls {
      position: absolute; bottom: 18px; right: 18px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .ctrl-btn {
      width: 30px; height: 30px;
      background: #fff; border: 1px solid #e0e0e0;
      border-radius: 6px; font-size: 15px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      transition: background .12s;
      color: #555;
    }
    .ctrl-btn:hover { background: #f0f0f0; }
    .ctrl-btn svg { width: 14px; height: 14px; }

    .info-reset {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; margin-top: 16px; padding: 6px 12px;
      border: 1px solid #d1d1d1; border-radius: 4px;
      background: #fff; color: #242424;
      font-size: 12px; font-weight: 400; cursor: pointer;
      font-family: inherit;
      transition: background .1s, border-color .1s;
    }
    .info-reset:hover { background: #f5f5f5; border-color: #c7c7c7; }
    .info-reset:active { background: #ebebeb; border-color: #bdbdbd; }
    .info-reset svg { width: 12px; height: 12px; flex-shrink: 0; opacity: .7; }

    #btn-reset svg { width: 12px; height: 12px; }

    /* ─── TOOLTIP ────────────────────────────────────────── */
    #tip {
      position: absolute; pointer-events: none; z-index: 99;
      background: rgba(17,24,39,.88); color: #fff;
      padding: 7px 11px; border-radius: 7px; font-size: 11px;
      opacity: 0; transition: opacity .15s;
      max-width: 220px; line-height: 1.5;
    }

    /* ─── HINT BAR ───────────────────────────────────────── */
    #hint {
      position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,.92); border: 1px solid #e8e8e8;
      padding: 6px 16px; border-radius: 20px; font-size: 11px; color: #888;
      pointer-events: none; box-shadow: 0 2px 8px rgba(0,0,0,.07);
      white-space: nowrap;
    }

    /* ─── BOTTOM LEGEND ─────────────────────────────────── */
    #bottom-legend {
      position: absolute; bottom: 18px; left: 50%;
      transform: translateX(-50%);
      display: flex; align-items: center; gap: 20px;
      background: rgba(255,255,255,.92); border: 1px solid #e8e8e8;
      padding: 7px 18px; border-radius: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,.07);
      pointer-events: none; white-space: nowrap;
    }
    .bl-item {
      display: flex; align-items: center; gap: 6px;
    }
    .bl-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .bl-label {
      font-size: 11px; font-weight: 600;
    }

    /* ─── LIST VIEW ──────────────────────────────────────── */
    #list-view {
      flex: 1; overflow-y: auto;
      padding: 24px 28px;
      background: #f5f5f5;
      display: none;
    }
    #list-view::-webkit-scrollbar { width: 6px; }
    #list-view::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

    #list-toolbar {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 16px;
    }
    #list-search {
      padding: 7px 12px; border: 1px solid #e0e0e0; border-radius: 7px;
      font-size: 12px; outline: none; background: #fff; color: #222;
      width: 220px; transition: border-color .2s;
    }
    #list-search:focus { border-color: #0078d4; }
    #list-cat-filter {
      padding: 7px 10px; border: 1px solid #e0e0e0; border-radius: 7px;
      font-size: 12px; outline: none; background: #fff; color: #444;
      cursor: pointer;
    }
    #list-count {
      font-size: 12px; font-weight: 700; color: #111; margin-left: auto;
    }

    #comp-table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 6px rgba(0,0,0,.07);
      table-layout: fixed;
    }
    #comp-table th {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .07em; color: #999;
      padding: 11px 16px;
      background: #fafafa;
      border-bottom: 1px solid #eee;
      text-align: left;
      cursor: pointer; user-select: none;
      white-space: nowrap;
    }
    #comp-table th:hover { background: #f0f0f0; color: #666; }
    #comp-table th .sort-wrap { display: inline-flex; vertical-align: middle; margin-left: 5px; }
    #comp-table th .sort-icon { width: 11px; height: 11px; opacity: .3; flex-shrink: 0; }
    #comp-table th.sort-asc  .sort-icon { opacity: 1; color: #0078d4; }
    #comp-table th.sort-desc .sort-icon { opacity: 1; color: #0078d4; }
    #comp-table th:nth-child(1) { width: 16%; }
    #comp-table th:nth-child(2) { width: 18%; }
    #comp-table th:nth-child(3) { width: 33%; }
    #comp-table th:nth-child(4) { width: 33%; }
    #comp-table td {
      padding: 9px 16px;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: top;
      font-size: 12px;
    }
    #comp-table tbody tr:last-child td { border-bottom: none; }
    #comp-table tbody tr:hover td { background: #fafffe; }
    .tbl-name { font-weight: 600; color: #111; }
    .tbl-badge {
      display: inline-flex; align-items: center;
      padding: 3px 9px; border-radius: 10px;
      font-size: 10px; font-weight: 600; color: #fff;
      white-space: nowrap;
    }
    .tbl-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 5px;
      font-size: 11px; font-weight: 500;
      margin: 1px 2px 1px 0; cursor: pointer;
      transition: filter .12s;
    }
    .tbl-chip:hover { filter: brightness(.92); }

    /* ─── SCROLLBAR ──────────────────────────────────────── */
    #info-panel::-webkit-scrollbar { width: 5px; }
    #info-panel::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
  </style>
</head>
<body>

<!-- VIEW BAR -->
<div id="view-bar">
  <span id="view-bar-title">CAP Design System Mapping</span>
  <div id="view-toggle">
    <button class="vt-btn active" id="btn-map" onclick="switchView('map')">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
        <circle cx="5" cy="8" r="2"/><circle cx="11" cy="4" r="2"/><circle cx="11" cy="12" r="2"/>
        <line x1="7" y1="7.1" x2="9.2" y2="5"/><line x1="7" y1="8.9" x2="9.2" y2="11"/>
      </svg>
      Map
    </button>
    <button class="vt-btn" id="btn-list" onclick="switchView('list')">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
        <rect x="2" y="3" width="12" height="2.5" rx="1"/><rect x="2" y="6.75" width="12" height="2.5" rx="1"/><rect x="2" y="10.5" width="12" height="2.5" rx="1"/>
      </svg>
      List
    </button>
  </div>
</div>

<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sb-header">
      <p>Click a node to explore connections</p>
    </div>
    <div class="sb-search">
      <input id="search" type="text" placeholder="Search components…" autocomplete="off" />
      <div id="search-dropdown"></div>
    </div>
    <div id="legend"></div>
    <div id="info-panel">
      <div class="info-empty">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5">
          <circle cx="12" cy="12" r="9"/><path d="M12 8v4m0 4h.01"/>
        </svg><br>Select a component<br>to see its connections
      </div>
    </div>
  </div>

  <!-- GRAPH -->
  <div id="graph-wrap">
    <svg id="svg">
      <defs>
        <marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4"
          markerWidth="5" markerHeight="5" orient="auto">
          <path d="M0,0 L8,4 L0,8 Z" fill="#c8c8c8"/>
        </marker>
      </defs>
    </svg>
    <div id="controls">
      <button class="ctrl-btn" id="btn-reset" title="Clear selection">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
          <line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="btn-in"  title="Zoom in">+</button>
      <button class="ctrl-btn" id="btn-out" title="Zoom out">−</button>
      <button class="ctrl-btn" id="btn-fit" title="Fit view">⊡</button>
    </div>
    <div id="hint">Click any node to highlight its connections</div>
    <div id="tip"></div>
    <div id="bottom-legend"></div>
  </div>

  <!-- LIST VIEW -->
  <div id="list-view">
    <div id="list-toolbar">
      <input id="list-search" type="text" placeholder="Search components…" oninput="filterTable()" />
      <select id="list-cat-filter" onchange="filterTable()">
        <option value="">All categories</option>
      </select>
      <span id="list-count"></span>
    </div>
    <table id="comp-table">
      <thead>
        <tr>
          <th data-col="name">Component <span class="sort-wrap"></span></th>
          <th data-col="cat">Category <span class="sort-wrap"></span></th>
          <th data-col="deps">Depends On <span class="sort-wrap"></span></th>
          <th data-col="usedby">Used By <span class="sort-wrap"></span></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
// ════════════════════════════════════════════════════════
// CATEGORY DEFINITIONS
// ════════════════════════════════════════════════════════
const CAT = {
  "Foundations": {
    color: "#2e7d52", light: "#e6f4ec",
    cx: .50, cy: .46, sub: "Atomic Layer"
  },
  "Input & Controls": {
    color: "#8a6d00", light: "#fdf5d0",
    cx: .10, cy: .50, sub: "Action Layer", xyStrength: 0.40, clusterStrength: 0.30
  },
  "Layout & Surfaces": {
    color: "#b83232", light: "#fde8e8",
    cx: .50, cy: .08, padScale: 0.9, xyStrength: 0.90, clusterStrength: 0.70, sub: "Shell Layer"
  },
  "Navigation & Feedback": {
    color: "#b5336e", light: "#fce4ef",
    cx: .90, cy: .50, sub: "Wayfinding Layer"
  },
  "Data & Expression": {
    color: "#1a5fa8", light: "#e3edf8",
    cx: .50, cy: .90, sub: "Product Specific Layer"
  }
};

// ════════════════════════════════════════════════════════
// COMPONENT DATA  (name, category, depends-on relations)
// ════════════════════════════════════════════════════════
const RAW = [
  // ── Foundations ──────────────────────────────────────
  { name:"Grid System",       cat:"Foundations",             deps:[] },
  { name:"Appearance",        cat:"Foundations",             deps:["Grid System"] },
  { name:"Fluent Iconography",cat:"Foundations",             deps:[] },
  { name:"Fluent Avatars",    cat:"Foundations",             deps:[] },
  { name:"Fluent Typography", cat:"Foundations",             deps:[] },
  { name:"Fluent Colors",     cat:"Foundations",             deps:[] },
  { name:"Fluent Styles",     cat:"Foundations",             deps:["Grid System"] },
  { name:"Avatar",            cat:"Foundations",             deps:["Fluent Avatars","Fluent Iconography","Fluent Typography","Popover"] },
  { name:"AvatarGroup",       cat:"Foundations",             deps:["Avatar","Tooltip"] },
  { name:"Badge",             cat:"Foundations",             deps:["Fluent Colors","Fluent Typography","Fluent Iconography","Appearance"] },
  { name:"Image",             cat:"Foundations",             deps:["Fluent Avatars"] },
  { name:"Label",             cat:"Foundations",             deps:["Badge","Fluent Colors","Fluent Typography","Fluent Iconography"] },

  // ── Input & Controls ─────────────────────────────────
  { name:"Accordion",         cat:"Input & Controls",        deps:["Fluent Iconography","Fluent Typography","Fluent Colors"] },
  { name:"Breadcrumb",        cat:"Input & Controls",        deps:["Fluent Colors","Fluent Iconography","Fluent Typography","Button","Link"] },
  { name:"Button",            cat:"Input & Controls",        deps:["Fluent Colors","Fluent Typography","Fluent Iconography","Appearance","Fluent Styles"] },
  { name:"Checkbox",          cat:"Input & Controls",        deps:["Field","Label","Fluent Colors","Fluent Iconography"] },
  { name:"ComboBox",          cat:"Input & Controls",        deps:["Field","Fluent Typography","Fluent Colors","Appearance","Fluent Styles"] },
  { name:"CompoundButton",    cat:"Input & Controls",        deps:["Button","Fluent Typography","Fluent Colors","Fluent Iconography","Appearance","Fluent Styles"] },
  { name:"CounterBadge",      cat:"Input & Controls",        deps:["Badge","Fluent Typography","Fluent Colors","Appearance","Fluent Styles"] },
  { name:"Dialog",            cat:"Input & Controls",        deps:["Button","Fluent Colors","Fluent Typography","Fluent Iconography","Fluent Styles","Appearance"] },
  { name:"Dropdown",          cat:"Input & Controls",        deps:["Fluent Colors","Fluent Typography","Fluent Iconography","Fluent Styles","Appearance"] },
  { name:"Field",             cat:"Input & Controls",        deps:["Label","Input","InfoLabel","StatusIndicator","Fluent Colors","Fluent Typography","Fluent Iconography","Fluent Styles","Appearance"] },

  { name:"InfoLabel",         cat:"Input & Controls",        deps:["Label","Popover","Fluent Colors","Fluent Typography","Fluent Iconography"] },
  { name:"Input",             cat:"Input & Controls",        deps:["Field","Fluent Colors","Fluent Typography","Fluent Iconography","Fluent Styles","Appearance"] },
  { name:"List",              cat:"Input & Controls",        deps:["Checkbox","Button","Menu","Fluent Colors","Fluent Typography","Fluent Iconography","Fluent Styles","Appearance"] },
  { name:"Menu",              cat:"Input & Controls",        deps:["Fluent Colors","Fluent Typography","Fluent Iconography","Fluent Styles","Appearance"] },
  { name:"MenuButton",        cat:"Input & Controls",        deps:["Menu","Fluent Colors","Fluent Typography","Fluent Iconography","Fluent Styles","Appearance"] },
  { name:"Persona",           cat:"Input & Controls",        deps:["Avatar","Badge","Fluent Colors","Fluent Typography","Fluent Iconography","Fluent Styles","Appearance","Fluent Avatars"] },
  { name:"Popover",           cat:"Input & Controls",        deps:["Link","Fluent Colors","Fluent Typography","Fluent Iconography","Fluent Styles","Appearance"] },
  { name:"RadioGroup",        cat:"Input & Controls",        deps:["Field","Label","Fluent Colors","Fluent Typography"] },
  { name:"SearchBox",         cat:"Input & Controls",        deps:["Input","Fluent Colors","Fluent Typography","Fluent Iconography","Fluent Styles","Appearance"] },
  { name:"SplitButton",       cat:"Input & Controls",        deps:["Button","Fluent Colors","Fluent Typography","Fluent Styles","Appearance"] },
  { name:"SplitDropdown",     cat:"Input & Controls",        deps:["Dropdown","Fluent Colors","Fluent Typography","Fluent Iconography","Fluent Styles","Appearance"] },

// ════════════════════════════════════════════════════════
// BUILD GRAPH DATA
// ════════════════════════════════════════════════════════
const nameMap = {};
RAW.forEach((c, i) => { nameMap[c.name] = i; });

const nodes = RAW.map((c, i) => ({
  id: i, name: c.name, cat: c.cat, deps: c.deps
}));

const links = [];
RAW.forEach((c, si) => {
  c.deps.forEach(dep => {
    const ti = nameMap[dep];
    if (ti !== undefined) links.push({ source: si, target: ti });
  });
});

// ════════════════════════════════════════════════════════
// LAYOUT
// ════════════════════════════════════════════════════════
const container = document.getElementById('graph-wrap');
let W = container.clientWidth, H = container.clientHeight;

const svg = d3.select('#svg').attr('viewBox', `0 0 ${W} ${H}`);
const g   = svg.append('g');

// Zoom
let currentK = 1;
let zoomSpreadTimer;

const zoom = d3.zoom().scaleExtent([.15, 5]).on('zoom', e => {
  g.attr('transform', e.transform);
  const k = e.transform.k;
  currentK = k;

  // Counter-scale label groups: position (R+8)/k below node, then scale 1/k
  nodeSel.select('.node-label-g')
    .attr('transform', `translate(0,${R + 8 / k})`);

  // Debounce simulation force spread (avoid restarting on every scroll tick)
  clearTimeout(zoomSpreadTimer);
  zoomSpreadTimer = setTimeout(() => {
    chargeForce.strength(-140 * k);
    collideForce.radius(10 * k);
    linkForce.distance(55 * k);
    sim.alpha(0.25).restart();
  }, 120);
});
svg.call(zoom);

// Set initial node positions by category
nodes.forEach(n => {
  const c = CAT[n.cat];
  n.x = c.cx * W + (Math.random()-.5)*100;
  n.y = c.cy * H + (Math.random()-.5)*100;
});

// ════════════════════════════════════════════════════════
// SIMULATION
// ════════════════════════════════════════════════════════
function clusterForce(alpha) {
  nodes.forEach(n => {
    const cfg = CAT[n.cat];
    const cx = cfg.cx * W;
    const cy = cfg.cy * H;
    const strength = cfg.clusterStrength || 0.18;
    n.vx += (cx - n.x) * strength * alpha;
    n.vy += (cy - n.y) * strength * alpha;
  });
}

const chargeForce  = d3.forceManyBody().strength(-140);
const collideForce = d3.forceCollide(10);
const linkForce    = d3.forceLink(links).id(d=>d.id).distance(55).strength(.25);

const sim = d3.forceSimulation(nodes)
  .force('link',    linkForce)
  .force('charge',  chargeForce)
  .force('collide', collideForce)
  .force('cluster', () => clusterForce(sim.alpha()))
  .force('x', d3.forceX(n => CAT[n.cat].cx * W).strength(n => CAT[n.cat].xyStrength || .20))
  .force('y', d3.forceY(n => CAT[n.cat].cy * H).strength(n => CAT[n.cat].xyStrength || .20));

// ════════════════════════════════════════════════════════
// DRAW
// ════════════════════════════════════════════════════════
const hullLayer  = g.append('g').attr('class','hulls');
const linkLayer  = g.append('g').attr('class','link-layer');
const nodeLayer  = g.append('g').attr('class','node-layer');
const labelLayer = g.append('g').attr('class','cat-labels');

// Links
const linkSel = linkLayer.selectAll('path').data(links).enter().append('path')
  .attr('class','link')
  .attr('stroke','#ccc')
  .attr('stroke-width', 1)
  .attr('fill','none');

function curvePath(d) {
  const sx = d.source.x, sy = d.source.y;
  const tx = d.target.x, ty = d.target.y;
  const mx = (sx + tx) / 2, my = (sy + ty) / 2;
  const dx = tx - sx, dy = ty - sy;
  const len = Math.hypot(dx, dy) || 1;
  const bend = len * 0.18;
  const cx = mx - (dy / len) * bend;
  const cy = my + (dx / len) * bend;
  return `M${sx},${sy} Q${cx},${cy} ${tx},${ty}`;
}

// Nodes
const R = 4; // radius

const nodeSel = nodeLayer.selectAll('.node-g').data(nodes).enter()
  .append('g').attr('class','node-g')
  .call(d3.drag()
    .on('start', (ev,d)=>{ if(!ev.active) sim.alphaTarget(.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on('drag',  (ev,d)=>{ d.fx=ev.x; d.fy=ev.y; })
    .on('end',   (ev,d)=>{ if(!ev.active) sim.alphaTarget(0); d.fx=null; d.fy=null; })
  )
  .on('click',     nodeClick)
  .on('mouseover', nodeOver)
  .on('mouseout',  nodeOut);

nodeSel.append('circle')
  .attr('r', R)
  .attr('fill',   d => CAT[d.cat].light)
  .attr('stroke', d => CAT[d.cat].color)
  .attr('stroke-width', 1.8);

// Label group — translate below circle, scale to counter zoom
const labelGs = nodeSel.append('g').attr('class', 'node-label-g')
  .attr('transform', `translate(0,${R + 8}) scale(1)`);

labelGs.append('rect')
  .attr('class','node-label-bg')
  .attr('fill','#fff')
  .attr('rx', 8).attr('ry', 8);

labelGs.append('text')
  .attr('class','node-label')
  .attr('text-anchor','middle')
  .attr('dy', 8)
  .attr('fill', d => CAT[d.cat].color)
  .text(d => d.name.length > 13 ? d.name.slice(0,11)+'…' : d.name);

// Measure text and size the background rect (once at init)
nodeSel.each(function() {
  const grp  = d3.select(this);
  const bbox = grp.select('.node-label').node().getBBox();
  const px = 4, py = 2;
  grp.select('.node-label-bg')
    .attr('x', bbox.x - px)
    .attr('y', bbox.y - py)
    .attr('width',  bbox.width  + px * 2)
    .attr('height', bbox.height + py * 2);
});

// Category labels — white pill at top of each ellipse
const catLabelData = Object.entries(CAT).map(([name, cfg]) => ({ name, cfg }));
const catLabelGroups = labelLayer.selectAll('.cat-label-g').data(catLabelData).enter()
  .append('g').attr('class', 'cat-label-g');

catLabelGroups.append('rect').attr('class','cat-label-bg')
  .attr('rx', 4).attr('ry', 4).attr('fill', '#fff')
  .attr('fill-opacity', .92);

catLabelGroups.append('text').attr('class','cat-label-text')
  .attr('text-anchor', 'middle')
  .attr('fill', d => d.cfg.color)
  .attr('dy', 0)
  .text(d => d.name.toUpperCase());

catLabelGroups.append('text').attr('class','cat-label-sub')
  .attr('text-anchor', 'middle')
  .attr('fill', d => d.cfg.color)
  .attr('dy', 10)
  .attr('font-size', '6px')
  .attr('font-weight', '500')
  .attr('letter-spacing', '.04em')
  .attr('opacity', .75)
  .text(d => d.cfg.sub);

// Size bg rect to cover both text elements
catLabelGroups.each(function() {
  const grp = d3.select(this);
  const b1 = grp.select('.cat-label-text').node().getBBox();
  const b2 = grp.select('.cat-label-sub').node().getBBox();
  const x  = Math.min(b1.x, b2.x);
  const y  = Math.min(b1.y, b2.y);
  const w  = Math.max(b1.x + b1.width, b2.x + b2.width) - x;
  const h  = Math.max(b1.y + b1.height, b2.y + b2.height) - y;
  const px = 6, py = 3;
  grp.select('rect')
    .attr('x', x - px).attr('y', y - py)
    .attr('width', w + px*2).attr('height', h + py*2);
});

// ════════════════════════════════════════════════════════
// HULL — ellipses fitted to each category cluster
// ════════════════════════════════════════════════════════
const PAD_X = 50, PAD_Y = 44; // padding around nodes

function drawHulls() {
  const bycat = {};
  nodes.forEach(n => { (bycat[n.cat] = bycat[n.cat]||[]).push(n); });

  const ellipseData = Object.entries(bycat).map(([cat, ns]) => {
    const xs = ns.map(n => n.x), ys = ns.map(n => n.y);
    const cx = (d3.min(xs) + d3.max(xs)) / 2;
    const cy = (d3.min(ys) + d3.max(ys)) / 2;
    const ps = CAT[cat].padScale || 1;
    const rx = Math.max((d3.max(xs) - d3.min(xs)) / 2 + PAD_X * ps, PAD_X * 1.2 * ps);
    const ry = Math.max((d3.max(ys) - d3.min(ys)) / 2 + PAD_Y * ps, PAD_Y * 1.2 * ps);
    return { cat, cx, cy, rx, ry };
  });

  const ovals = hullLayer.selectAll('.hull-path').data(ellipseData, d => d.cat);
  ovals.enter().append('ellipse').attr('class','hull-path')
    .merge(ovals)
    .attr('cx', d => d.cx)
    .attr('cy', d => d.cy)
    .attr('rx', d => d.rx)
    .attr('ry', d => d.ry)
    .attr('fill',   d => CAT[d.cat].light)
    .attr('stroke', d => CAT[d.cat].color);
  ovals.exit().remove();

  // Position label groups at top-center of each ellipse, counter-scaled for zoom
  const ellipseMap = {};
  ellipseData.forEach(e => { ellipseMap[e.cat] = e; });
  catLabelGroups.attr('transform', d => {
    const e = ellipseMap[d.name];
    if (!e) return '';
    return `translate(${e.cx}, ${e.cy - e.ry + 16})`;
  });
}

// ════════════════════════════════════════════════════════
// TICK
// ════════════════════════════════════════════════════════
sim.on('tick', () => {
  linkSel.attr('d', curvePath);

  nodeSel.attr('transform', d=>`translate(${d.x},${d.y})`);

  drawHulls();
});

// ════════════════════════════════════════════════════════
// INTERACTION — selection state
// ════════════════════════════════════════════════════════
let selected = null;

function connectedSets(d) {
  const nodeSet = new Set([d.id]);
  const linkSet = new Set();
  links.forEach((l,i) => {
    const s = l.source.id, t = l.target.id;
    if (s===d.id||t===d.id){ nodeSet.add(s); nodeSet.add(t); linkSet.add(i); }
  });
  return { nodeSet, linkSet };
}

function applyHighlight(d) {
  const {nodeSet, linkSet} = connectedSets(d);

  nodeSel.select('circle')
    .attr('opacity', n => nodeSet.has(n.id) ? 1 : .12)
    .attr('stroke-width', n => n.id===d.id ? 3 : 1.8)
    .style('filter', n => n.id===d.id ? 'drop-shadow(0 2px 6px rgba(0,0,0,.35))' : null);

  nodeSel.select('.node-label-g')
    .attr('opacity', n => nodeSet.has(n.id) ? 1 : .12);

  nodeSel.select('.node-label-bg')
    .attr('fill', n => n.id === d.id ? CAT[n.cat].color : '#fff');
  nodeSel.select('.node-label')
    .attr('fill', n => n.id === d.id ? '#fff' : CAT[n.cat].color);

  linkSel
    .attr('opacity', (_,i) => linkSet.has(i) ? .8 : .06)
    .attr('stroke',  (l,i) => linkSet.has(i) ? CAT[l.source.cat||nodes[l.source.id]?.cat].color : '#ccc')
    .attr('stroke-width', (_,i) => linkSet.has(i) ? 1.8 : 1);

  hullLayer.selectAll('.hull-path').attr('opacity', h => nodeSet.has(nodes.find(n=>n.cat===h.cat)?.id) ? .9 : .25);
}

function clearHighlight() {
  nodeSel.select('circle').attr('opacity',1).attr('stroke-width',1.8).style('filter',null);
  nodeSel.select('.node-label-g').attr('opacity',1);
  nodeSel.select('.node-label-bg').attr('fill','#fff');
  nodeSel.select('.node-label').attr('fill', n => CAT[n.cat].color);
  linkSel.attr('opacity',.55).attr('stroke','#ccc').attr('stroke-width',1);
  hullLayer.selectAll('.hull-path').attr('opacity',1);
}

function nodeClick(ev, d) {
  ev.stopPropagation();
  if (selected?.id === d.id) { selected=null; clearHighlight(); showEmpty(); return; }
  selected = d;
  applyHighlight(d);
  showInfo(d);
}

svg.on('click', () => { selected=null; clearHighlight(); showEmpty(); });

// ════════════════════════════════════════════════════════
// INFO PANEL
// ════════════════════════════════════════════════════════
function showEmpty() {
  document.getElementById('info-panel').innerHTML = `
    <div class="info-empty">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5">
        <circle cx="12" cy="12" r="9"/><path d="M12 8v4m0 4h.01"/>
      </svg><br>Select a component<br>to see its connections
    </div>`;
}

function chipHtml(name) {
  const ni = nameMap[name];
  if (ni===undefined) return '';
  const cat = nodes[ni].cat;
  const col = CAT[cat].color;
  const bg  = CAT[cat].light;
  return `<span class="info-chip" style="background:${bg};border-color:${col}20;color:${col}"
    onclick="selectByName('${name.replace(/'/,"\\'")}')">
    <span class="info-chip-dot" style="background:${col}"></span>${name}
  </span>`;
}

function showInfo(d) {
  const col  = CAT[d.cat].color;
  const usedBy = nodes.filter(n => n.deps.includes(d.name));

  let html = `
    <div class="info-name">${d.name}</div>
    <span class="info-badge" style="background:${col}">${d.cat}</span>`;

  if (d.deps.length) {
    html += `<div class="info-section">Depends on · ${d.deps.length}</div><div>`;
    d.deps.forEach(dep => { html += chipHtml(dep); });
    html += `</div>`;
  }
  if (usedBy.length) {
    html += `<div class="info-section">Used by · ${usedBy.length}</div><div>`;
    usedBy.forEach(n => { html += chipHtml(n.name); });
    html += `</div>`;
  }
  if (!d.deps.length && !usedBy.length) {
    html += `<p style="font-size:12px;color:#bbb;margin-top:8px">No connections</p>`;
  }

  html += `<button class="info-reset" onclick="selected=null;clearHighlight();showEmpty()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
      <line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/>
    </svg>
    Clear selection
  </button>`;

  document.getElementById('info-panel').innerHTML = html;
}

window.selectByName = function(name) {
  const i = nameMap[name];
  if (i===undefined) return;
  const d = nodes[i];
  selected = d;
  applyHighlight(d);
  showInfo(d);
  // pan to node
  const t = d3.zoomTransform(svg.node());
  svg.transition().duration(450).call(
    zoom.transform,
    d3.zoomIdentity.translate(W/2, H/2).scale(t.k).translate(-d.x, -d.y)
  );
};

// ════════════════════════════════════════════════════════
// TOOLTIP
// ════════════════════════════════════════════════════════
const tip = document.getElementById('tip');

function nodeOver(ev, d) {
  const usedBy = nodes.filter(n=>n.deps.includes(d.name)).length;
  tip.innerHTML = `<strong>${d.name}</strong><br><span style="opacity:.7">${d.cat}</span><br>
    ${d.deps.length} dependencies · used by ${usedBy}`;
  tip.style.opacity = '1';
  // t.applyX/Y gives coords in SVG element space, which equals graph-wrap local space
  const t = d3.zoomTransform(svg.node());
  const lx = t.applyX(d.x);
  const ly = t.applyY(d.y);
  tip.style.left = (lx - tip.offsetWidth / 2) + 'px';
  tip.style.top  = (ly - R * t.k - tip.offsetHeight - 8) + 'px';
}
function nodeOut() { tip.style.opacity='0'; }

// ════════════════════════════════════════════════════════
// SEARCH + DISAMBIGUATION DROPDOWN
// ════════════════════════════════════════════════════════
const searchEl   = document.getElementById('search');
const searchDrop = document.getElementById('search-dropdown');
let ddActiveIdx  = -1;

function closeDrop() {
  searchDrop.style.display = 'none';
  ddActiveIdx = -1;
}

function openDrop(matches) {
  searchDrop.innerHTML = '';
  if (!matches.length) {
    searchDrop.innerHTML = '<div class="sd-empty">No components found</div>';
    searchDrop.style.display = 'block';
    return;
  }
  matches.forEach((d, i) => {
    const col = CAT[d.cat].color;
    const el = document.createElement('div');
    el.className = 'sd-item';
    el.dataset.idx = i;
    el.innerHTML = `<span class="sd-dot" style="background:${col}"></span>
      <span class="sd-name">${d.name}</span>
      <span class="sd-cat">${d.cat.split(' ')[0]}</span>`;
    el.addEventListener('mousedown', e => {
      e.preventDefault(); // prevent blur before click
      searchEl.value = '';
      closeDrop();
      clearHighlight();
      selectByName(d.name);
    });
    searchDrop.appendChild(el);
  });
  searchDrop.style.display = 'block';
  ddActiveIdx = -1;
}

searchEl.addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (!q) {
    closeDrop();
    if (!selected) clearHighlight();
    return;
  }
  const matches = nodes.filter(n => n.name.toLowerCase().includes(q))
    .sort((a, b) => {
      const ai = a.name.toLowerCase().indexOf(q), bi = b.name.toLowerCase().indexOf(q);
      return ai - bi || a.name.localeCompare(b.name);
    });
  openDrop(matches);

  const matchedIds = new Set(matches.map(n => n.id));
  nodeSel.select('circle').attr('opacity', n => matchedIds.has(n.id) ? 1 : .1);
  nodeSel.select('.node-label-g').attr('opacity', n => matchedIds.has(n.id) ? 1 : .1);
  linkSel.attr('opacity', .05);
  hullLayer.selectAll('.hull-path').attr('opacity', .15);
});

// Keyboard navigation
searchEl.addEventListener('keydown', function(e) {
  const items = searchDrop.querySelectorAll('.sd-item');
  if (!items.length) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    ddActiveIdx = Math.min(ddActiveIdx + 1, items.length - 1);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    ddActiveIdx = Math.max(ddActiveIdx - 1, 0);
  } else if (e.key === 'Enter' && ddActiveIdx >= 0) {
    items[ddActiveIdx].dispatchEvent(new MouseEvent('mousedown'));
    return;
  } else if (e.key === 'Escape') {
    closeDrop(); return;
  } else { return; }
  items.forEach((el, i) => el.classList.toggle('sd-active', i === ddActiveIdx));
  items[ddActiveIdx]?.scrollIntoView({ block: 'nearest' });
});

searchEl.addEventListener('blur', () => setTimeout(closeDrop, 150));

// ════════════════════════════════════════════════════════
// LEGEND
// ════════════════════════════════════════════════════════
const legendEl = document.getElementById('legend');
legendEl.innerHTML = '<div class="legend-heading">Categories</div>';
let activeCatFilter = null;

Object.entries(CAT).forEach(([cat, cfg]) => {
  const count = nodes.filter(n=>n.cat===cat).length;
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.dataset.cat = cat;
  item.style.background = cfg.light;
  item.style.borderColor = cfg.color + '40';
  item.innerHTML = `
    <div class="legend-dot" style="background:${cfg.color}"></div>
    <span class="legend-label" style="color:${cfg.color}">${cat}</span>
    <span class="legend-count" style="color:${cfg.color}">${count}</span>`;
  item.addEventListener('click', () => {
    if (activeCatFilter === cat) {
      activeCatFilter = null;
      item.classList.remove('active');
      if (!selected) clearHighlight();
    } else {
      document.querySelectorAll('.legend-item').forEach(el=>el.classList.remove('active'));
      item.classList.add('active');
      activeCatFilter = cat;
      const catIds = new Set(nodes.filter(n=>n.cat===cat).map(n=>n.id));
      nodeSel.select('circle').attr('opacity', n => catIds.has(n.id) ? 1 : .1);
      nodeSel.select('.node-label-g').attr('opacity', n => catIds.has(n.id) ? 1 : .1);
      linkSel.attr('opacity', (l) => catIds.has(l.source.id||l.source) ? .4 : .04);
      hullLayer.selectAll('.hull-path').attr('opacity', h => h.cat===cat ? 1 : .12);
    }
  });
  legendEl.appendChild(item);
});

// ════════════════════════════════════════════════════════
// ZOOM CONTROLS
// ════════════════════════════════════════════════════════
document.getElementById('btn-reset').addEventListener('click', () => { selected=null; clearHighlight(); showEmpty(); });
document.getElementById('btn-in') .addEventListener('click', ()=>svg.transition().duration(280).call(zoom.scaleBy, 1.35));
document.getElementById('btn-out').addEventListener('click', ()=>svg.transition().duration(280).call(zoom.scaleBy, 1/1.35));
document.getElementById('btn-fit').addEventListener('click', fitView);

function fitView() {
  const pad = 40;
  const ellipses = hullLayer.selectAll('.hull-path').nodes();
  let x0 = Infinity, x1 = -Infinity, y0 = Infinity, y1 = -Infinity;
  ellipses.forEach(el => {
    const cx = +el.getAttribute('cx'), cy = +el.getAttribute('cy');
    const rx = +el.getAttribute('rx'), ry = +el.getAttribute('ry');
    x0 = Math.min(x0, cx - rx); x1 = Math.max(x1, cx + rx);
    y0 = Math.min(y0, cy - ry); y1 = Math.max(y1, cy + ry);
  });
  // fallback to node positions if hulls not yet drawn
  if (!isFinite(x0)) {
    const xs = nodes.map(n => n.x), ys = nodes.map(n => n.y);
    x0 = Math.min(...xs); x1 = Math.max(...xs);
    y0 = Math.min(...ys); y1 = Math.max(...ys);
  }
  const cw = container.clientWidth, ch = container.clientHeight;
  const k = Math.min((cw - pad*2) / (x1-x0), (ch - pad*2) / (y1-y0), 2);
  const tx = (cw - k*(x0+x1)) / 2;
  const ty = (ch - k*(y0+y1)) / 2;
  svg.transition().duration(500).call(
    zoom.transform,
    d3.zoomIdentity.translate(tx, ty).scale(k)
  );
}

// Bottom legend
const blEl = document.getElementById('bottom-legend');
Object.entries(CAT).forEach(([cat, cfg]) => {
  const item = document.createElement('div');
  item.className = 'bl-item';
  item.innerHTML = `<div class="bl-dot" style="background:${cfg.color}"></div>
    <span class="bl-label" style="color:${cfg.color}">${cat}</span>`;
  blEl.appendChild(item);
});

// Initial fit after simulation settles
setTimeout(fitView, 2200);

// ════════════════════════════════════════════════════════
// VIEW TOGGLE
// ════════════════════════════════════════════════════════
let currentView = 'map';
let tableBuilt = false;

// Populate category filter dropdown
const catFilterEl = document.getElementById('list-cat-filter');
Object.keys(CAT).forEach(cat => {
  const opt = document.createElement('option');
  opt.value = cat; opt.textContent = cat;
  catFilterEl.appendChild(opt);
});

window.switchView = function(view) {
  currentView = view;
  document.getElementById('graph-wrap').style.display = view === 'map' ? '' : 'none';
  document.getElementById('list-view').style.display  = view === 'list' ? 'flex' : 'none';
  document.getElementById('list-view').style.flexDirection = 'column';
  document.getElementById('btn-map').classList.toggle('active',  view === 'map');
  document.getElementById('btn-list').classList.toggle('active', view === 'list');
  if (view === 'list') {
    if (!tableBuilt) buildTable();
    filterTable();
  }
};

function chipHtmlTable(name) {
  const ni = nameMap[name];
  if (ni === undefined) return `<span class="tbl-chip" style="background:#f0f0f0;color:#888">${name}</span>`;
  const dc = CAT[nodes[ni].cat];
  return `<span class="tbl-chip" style="background:${dc.light};color:${dc.color}"
    onclick="switchView('map');selectByName('${name.replace(/'/g, "\\'")}')">${name}</span>`;
}

function buildTable() {
  tableBuilt = true;
  const tbody = document.querySelector('#comp-table tbody');
  const sorted = [...nodes].sort((a,b) => a.cat.localeCompare(b.cat) || a.name.localeCompare(b.name));

  sorted.forEach(d => {
    const col = CAT[d.cat].color;
    const usedBy = nodes.filter(n => n.deps.includes(d.name));
    const tr = document.createElement('tr');
    tr.dataset.name   = d.name.toLowerCase();
    tr.dataset.cat    = d.cat;
    tr.dataset.deps   = d.deps.length;
    tr.dataset.usedby = usedBy.length;
    tr.innerHTML = `
      <td class="tbl-name">${d.name}</td>
      <td><span class="tbl-badge" style="background:${col}">${d.cat}</span></td>
      <td>${d.deps.map(chipHtmlTable).join('') || '<span style="color:#ccc">—</span>'}</td>
      <td>${usedBy.map(n => chipHtmlTable(n.name)).join('') || '<span style="color:#ccc">—</span>'}</td>`;
    tbody.appendChild(tr);
  });
}

// Column sort — Fluent chevron icons
const SVG_ATTRS = `viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"`;
const CHEVRON_NEUTRAL = `<svg class="sort-icon" ${SVG_ATTRS}><path d="M4 6.5 L8 3.5 L12 6.5"/><path d="M4 9.5 L8 12.5 L12 9.5"/></svg>`;
const CHEVRON_UP      = `<svg class="sort-icon" ${SVG_ATTRS}><path d="M4 10 L8 6 L12 10"/></svg>`;
const CHEVRON_DOWN    = `<svg class="sort-icon" ${SVG_ATTRS}><path d="M4 6 L8 10 L12 6"/></svg>`;

// Init all headers with neutral icon
document.querySelectorAll('#comp-table th .sort-wrap').forEach(w => { w.innerHTML = CHEVRON_NEUTRAL; });

let sortCol = null, sortDir = 1;

document.querySelectorAll('#comp-table th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) { sortDir *= -1; } else { sortCol = col; sortDir = 1; }

    document.querySelectorAll('#comp-table th').forEach(h => {
      h.classList.remove('sort-asc', 'sort-desc');
      const w = h.querySelector('.sort-wrap');
      if (w) w.innerHTML = CHEVRON_NEUTRAL;
    });
    th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
    th.querySelector('.sort-wrap').innerHTML = sortDir === 1 ? CHEVRON_UP : CHEVRON_DOWN;

    const tbody = document.querySelector('#comp-table tbody');
    const numeric = col === 'deps' || col === 'usedby';
    [...tbody.querySelectorAll('tr')].sort((a, b) => {
      const av = numeric ? +a.dataset[col] : a.dataset[col];
      const bv = numeric ? +b.dataset[col] : b.dataset[col];
      return (av < bv ? -1 : av > bv ? 1 : 0) * sortDir;
    }).forEach(tr => tbody.appendChild(tr));
  });
});

window.filterTable = function() {
  const q   = document.getElementById('list-search').value.trim().toLowerCase();
  const cat = document.getElementById('list-cat-filter').value;
  let visible = 0;
  document.querySelectorAll('#comp-table tbody tr').forEach(tr => {
    const show = (!q || tr.dataset.name.includes(q)) && (!cat || tr.dataset.cat === cat);
    tr.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  document.getElementById('list-count').textContent = `${visible} component${visible !== 1 ? 's' : ''}`;
};

// Resize
window.addEventListener('resize', () => {
  W = container.clientWidth; H = container.clientHeight;
  svg.attr('viewBox', `0 0 ${W} ${H}`);
  sim.force('x', d3.forceX(n=>CAT[n.cat].cx*W).strength(.12))
     .force('y', d3.forceY(n=>CAT[n.cat].cy*H).strength(.12))
     .alpha(.3).restart();
});
</script>
</body>
